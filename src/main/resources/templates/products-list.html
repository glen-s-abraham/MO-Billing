<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - MO-Billing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <th:block th:replace="~{fragments :: datatables-css}"></th:block>
    <style>
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Product Catalog</h2>
        <a href="/products/new" class="btn btn-primary fw-bold shadow-sm">+ Add Product</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible bg-success text-white fade show border-0 shadow-sm" role="alert">
        <strong th:text="${successMessage}">Success</strong>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card shadow-sm border-0 p-4">
        <div class="table-responsive">
            <table class="table table-hover align-middle datatable">
                <thead class="table-light">
                    <tr>
                        <th>Title</th>
                        <th>UOM</th>
                        <th>Supply Rate</th>
                        <th>Retail Price (MRP)</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="product : ${products}">
                        <td class="fw-bold" th:text="${product.title}"></td>
                        <td th:text="${product.uom}"></td>
                        <td th:text="${#numbers.formatDecimal(product.supplyRate, 1, 2)}"></td>
                        <td th:text="${#numbers.formatDecimal(product.mrp, 1, 2)}"></td>
                        <td>
                            <span th:if="${product.isActive}" class="badge bg-success">Active</span>
                            <span th:unless="${product.isActive}" class="badge bg-danger">Inactive</span>
                        </td>
                        <td>
                            <a th:href="@{/products/{id}/edit(id=${product.id})}" class="btn btn-sm btn-outline-primary">Edit</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<th:block th:replace="~{fragments :: datatables-js}"></th:block>
<script>
    $(document).ready(function() {
        $('.datatable').DataTable({
            "order": [],
            "language": {
                "search": "_INPUT_",
                "searchPlaceholder": "Search Products..."
            }
        });
    });
</script>
</body>
</html>
