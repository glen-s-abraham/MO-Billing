<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
</head>
<body>

<th:block th:fragment="common_head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title th:text="${title} + ' - MO-Billing'">MO-Billing</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/style.css">
</th:block>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-light bg-light sticky-top mb-4">
    <div class="container">
        <a class="navbar-brand fw-bolder fs-4" href="/"> <i class="bi bi-rocket-takeoff text-primary"></i> MO-Billing</a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${requestURI != null and #strings.startsWith(requestURI, '/estimates') ? 'active' : ''}" href="/estimates">Estimates</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${requestURI != null and #strings.startsWith(requestURI, '/credit-notes') ? 'active' : ''}" href="/credit-notes">Credit Notes</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${requestURI != null and #strings.startsWith(requestURI, '/buyers') ? 'active' : ''}" href="/buyers">Buyers</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${requestURI != null and #strings.startsWith(requestURI, '/products') ? 'active' : ''}" href="/products">Products</a>
                </li>
                <li class="nav-item" sec:authorize="hasAuthority('ROLE_ADMIN')">
                    <a class="nav-link" th:classappend="${requestURI != null and requestURI == '/users' ? 'active' : ''}" href="/users">Users</a>
                </li>
                <li class="nav-item" sec:authorize="hasAuthority('ROLE_ADMIN')">
                    <a class="nav-link" th:classappend="${requestURI != null and requestURI == '/settings' ? 'active' : ''}" href="/settings">Settings</a>
                </li>
            </ul>

            <ul class="navbar-nav ms-lg-auto">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-person-circle fs-5 me-2"></i>
                        <span sec:authentication="name" class="small fw-bold">User</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end shadow-lg border-0 rounded-4 mt-2 overflow-hidden" aria-labelledby="userDropdown" style="min-width: 200px;">
                        <li class="px-3 py-2 border-bottom bg-light">
                            <div class="small text-muted">Signed in as</div>
                            <div class="small fw-bold text-dark" sec:authentication="name">User</div>
                        </li>
                        <li>
                            <form th:action="@{/logout}" method="post" class="m-0">
                                <button type="submit" class="dropdown-item text-danger py-2 d-flex align-items-center">
                                    <i class="bi bi-box-arrow-right me-2"></i>
                                    <span class="small fw-bold">Logout</span>
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div th:fragment="bottom_nav" class="bottom-app-bar d-md-none">
    <a href="/estimates" class="nav-item" th:classappend="${requestURI != null and #strings.startsWith(requestURI, '/estimates') ? 'active' : ''}">
        <i class="bi bi-file-earmark-text"></i>
        <span>Estimates</span>
    </a>
    <a href="/credit-notes" class="nav-item" th:classappend="${requestURI != null and #strings.startsWith(requestURI, '/credit-notes') ? 'active' : ''}">
        <i class="bi bi-arrow-return-left"></i>
        <span>Credits</span>
    </a>
    <a href="/buyers" class="nav-item" th:classappend="${requestURI != null and #strings.startsWith(requestURI, '/buyers') ? 'active' : ''}">
        <i class="bi bi-people"></i>
        <span>Buyers</span>
    </a>
    <a href="/products" class="nav-item" th:classappend="${requestURI != null and #strings.startsWith(requestURI, '/products') ? 'active' : ''}">
        <i class="bi bi-box-seam"></i>
        <span>Products</span>
    </a>
    <form th:action="@{/logout}" method="post" id="mobileLogoutForm" class="d-none"></form>
    <a href="javascript:void(0)" onclick="document.getElementById('mobileLogoutForm').submit();" class="nav-item text-danger">
        <i class="bi bi-box-arrow-right"></i>
        <span>Exit</span>
    </a>
</div>

<th:block th:fragment="datatables-css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css">
</th:block>

<th:block th:fragment="datatables-js">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
</th:block>

</body>
</html>
