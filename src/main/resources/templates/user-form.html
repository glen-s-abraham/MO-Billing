<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments :: common_head(${user.id == null ? 'Add User' : 'Edit User'})}"></th:block>
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>
<div th:replace="~{fragments :: bottom_nav}"></div>

<div class="container pb-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0">
                <div class="card-header py-3 bg-white">
                    <h4 class="mb-0 fw-bold" th:text="${user.id == null ? 'Create New User' : 'Edit User Access'}"></h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/users}" th:object="${user}" method="post">
                        <input type="hidden" th:field="*{id}">
                        
                        <div class="mb-4">
                            <label for="username" class="form-label small fw-bold text-muted">Username</label>
                            <input type="text" th:field="*{username}" class="form-control" placeholder="Enter unique username" required>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label small fw-bold text-muted">Password</label>
                            <input type="password" th:field="*{password}" class="form-control" placeholder="Leave empty to keep existing" th:required="${user.id == null}">
                            <div th:if="${user.id != null}" class="form-text small opacity-50">Only fill this if you want to reset the password.</div>
                        </div>

                        <div class="mb-4">
                            <label for="role" class="form-label small fw-bold text-muted">Assign Role</label>
                            <select th:field="*{role}" class="form-select" required>
                                <option th:each="r : ${roles}" th:value="${r}" th:text="${#strings.replace(r, 'ROLE_', '')}"></option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" th:field="*{active}" id="activeSwitch">
                                <label class="form-check-label small fw-bold text-muted" for="activeSwitch">Account Active</label>
                            </div>
                        </div>

                        <div class="d-flex gap-2 pt-2">
                            <button type="submit" class="btn btn-primary flex-grow-1 shadow-sm">Save User Profile</button>
                            <a href="/users" class="btn btn-outline-secondary shadow-sm">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
