<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments :: common_head('Estimate Form')}"></th:block>
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
    <style>
        .row-total-display { font-weight: bold; background-color: #e9ecef; }
        .grand-total-display { font-size: 1.5rem; font-weight: 800; color: #198754; }
    </style>
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>
<div th:replace="~{fragments :: bottom_nav}"></div>

<div class="container">
    <div class="mb-4">
        <h2 th:text="${estimate.id != null ? 'Edit Estimate ' + estimate.estimateNumber : 'Create New Estimate'}">Estimate</h2>
        <a href="/estimates" class="text-decoration-none">&larr; Back to Estimates</a>
    </div>

    <form th:action="@{/estimates/save}" th:object="${estimate}" method="post" id="estimateForm">
        <input type="hidden" th:field="*{id}">
        <input type="hidden" th:field="*{estimateNumber}">

        <div class="card shadow-sm border-0 mb-4">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0 text-primary">Document Details</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">Select Buyer</label>
                        <select class="form-select" th:field="*{buyerEntity}" id="buyerSelect" required>
                            <option value="">-- Select Buyer --</option>
                            <option th:each="buyer : ${buyers}" th:value="${buyer.id}" th:text="${buyer.name}"></option>
                        </select>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">Estimate Date</label>
                        <input type="date" class="form-control" th:field="*{estimateDate}" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">Status</label>
                        <select class="form-select" th:field="*{status}">
                            <option value="DRAFT">DRAFT</option>
                            <option value="SENT">SENT</option>
                            <option value="ACCEPTED">ACCEPTED</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm border-0 mb-4">
            <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                <h5 class="mb-0 text-primary">Line Items</h5>
                <button type="button" class="btn btn-sm btn-outline-primary fw-bold" id="addRowBtn">+ Add Row</button>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-bordered mb-0" id="itemsTable">
                        <thead class="table-light">
                            <tr>
                                <th width="25%">Product</th>
                                <th width="10%">MRP</th>
                                <th width="10%">Qty</th>
                                <th width="15%">Rate (₹)</th>
                                <th width="12%">Apply Tax</th>
                                <th width="18%">Total (₹)</th>
                                <th width="10%" class="text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="itemsTbody">
                            <!-- Template row for JS cloning -->
                            <tr class="item-row template-row d-none bg-light">
                                <td>
                                    <select class="form-select product-select" disabled>
                                        <option value="">-- Select --</option>
                                        <option th:each="product : ${products}" th:value="${product.id}" th:text="${product.title}"></option>
                                    </select>
                                    <div class="row-tax-container small text-muted mt-1"></div>
                                    <div class="row-tax-data-store d-none"></div>
                                    <input type="hidden" class="row-is-inclusive" value="false">
                                </td>
                                <td><input type="number" step="0.01" class="form-control mrp-input" value="0.00" disabled></td>
                                <td><input type="number" step="0.01" class="form-control qty-input" value="1" disabled></td>
                                <td><input type="number" step="0.01" class="form-control rate-input" value="0.00" disabled></td>
                                <td class="text-center align-middle">
                                    <div class="form-check form-switch d-inline-block">
                                        <input class="form-check-input tax-enabled-check" type="checkbox" checked disabled>
                                        <input type="hidden" class="tax-enabled-hidden" disabled value="on">
                                    </div>
                                </td>
                                <td><input type="text" class="form-control row-total-display text-end" value="0.00" readonly disabled></td>
                                <td class="text-center"><button type="button" class="btn btn-sm btn-danger remove-row-btn fw-bold">X</button></td>
                            </tr>
                            
                            <!-- Existing rows -->
                            <tr class="item-row" th:each="item, stat : *{items}">
                                <td>
                                    <select class="form-select product-select" th:name="'items[' + ${stat.index} + '].productEntity'">
                                        <option value="">-- Select --</option>
                                        <option th:each="product : ${products}" 
                                                th:value="${product.id}" 
                                                th:text="${product.title}"
                                                th:selected="${item.productEntity != null and item.productEntity.id == product.id}">
                                        </option>
                                    </select>
                                    <div class="row-tax-container small text-muted mt-1">
                                        <span th:each="itax : ${item.taxes}" th:text="${itax.taxName + '(' + itax.taxPercentage + '%) '}" class="me-1"></span>
                                    </div>
                                    <div class="row-tax-data-store d-none">
                                        <span th:each="itax : ${item.taxes}" class="tax-item-config" 
                                              th:attr="data-name=${itax.taxName}, data-percentage=${itax.taxPercentage}"></span>
                                    </div>
                                    <input type="hidden" class="row-is-inclusive" th:name="'items[' + ${stat.index} + '].taxInclusive'" th:value="${item.taxInclusive}">
                                </td>
                                <td>
                                    <input type="number" step="0.01" class="form-control mrp-input" th:name="'items[' + ${stat.index} + '].mrp'" th:value="${item.mrp}">
                                </td>
                                <td>
                                    <input type="number" step="0.01" class="form-control qty-input" th:name="'items[' + ${stat.index} + '].quantity'" th:value="${item.quantity}">
                                </td>
                                <td>
                                    <input type="number" step="0.01" class="form-control rate-input" th:name="'items[' + ${stat.index} + '].rate'" th:value="${item.rate}">
                                </td>
                                <td class="text-center align-middle">
                                    <div class="form-check form-switch d-inline-block">
                                        <input class="form-check-input tax-enabled-check" type="checkbox" th:name="'items[' + ${stat.index} + '].taxEnabled'" th:checked="${item.taxEnabled}" value="true">
                                        <input type="hidden" th:name="'_items[' + ${stat.index} + '].taxEnabled'" value="on">
                                    </div>
                                </td>
                                <td>
                                    <input type="text" class="form-control row-total-display text-end" th:name="'items[' + ${stat.index} + '].rowTotal'" th:value="${item.rowTotal}" readonly>
                                </td>
                                <td class="text-center"><button type="button" class="btn btn-sm btn-danger remove-row-btn fw-bold">X</button></td>
                            </tr>
                        </tbody>
                        <tfoot>
                            <tr class="table-light">
                                <td colspan="5" class="text-end fw-bold">Subtotal (Base)</td>
                                <td class="text-end fw-bold" id="subtotalBaseText">0.00</td>
                                <td></td>
                            </tr>
                            <tr id="taxBreakdownFooter" class="table-light">
                                <!-- Tax rows injected here via JS -->
                            </tr>
                            <tr>
                                <td colspan="5" class="text-end fw-bold align-middle bg-light">Grand Total</td>
                                <td class="text-end grand-total-display">₹ <span id="grandTotalText">0.00</span></td>
                                <td></td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>

        <div class="text-end">
            <button type="submit" class="btn btn-success btn-lg px-5 fw-bold shadow-sm rounded-pill">Save Document</button>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const tbody = document.getElementById('itemsTbody');
    const grandTotalSpan = document.getElementById('grandTotalText');

    new TomSelect("#buyerSelect", {
        create: false,
        placeholder: "-- Select Buyer --",
        onItemAdd: function() {
            this.blur();
        }
    });

    function getRowTaxes(row) {
        const taxes = [];
        row.querySelectorAll('.tax-item-config').forEach(el => {
            taxes.push({
                taxName: el.getAttribute('data-name'),
                taxPercentage: parseFloat(el.getAttribute('data-percentage')) || 0
            });
        });
        return taxes;
    }

    function calculateRow(row) {
        const qty = parseFloat(row.querySelector('.qty-input').value) || 0;
        const rate = parseFloat(row.querySelector('.rate-input').value) || 0;
        const isTaxEnabled = row.querySelector('.tax-enabled-check').checked;
        const isTaxInclusive = row.querySelector('.row-is-inclusive').value === 'true';
        const taxes = getRowTaxes(row);
        
        let totalTaxRate = 0;
        taxes.forEach(t => {
            const pct = parseFloat(t.taxPercentage);
            if(!isNaN(pct)) totalTaxRate += pct;
        });

        let rowTotal = 0;
        if (isTaxEnabled) {
            if (isTaxInclusive) {
                rowTotal = qty * rate;
            } else {
                rowTotal = (qty * rate) * (1 + (totalTaxRate / 100));
            }
        } else {
            rowTotal = qty * rate;
        }
        
        row.querySelector('.row-total-display').value = rowTotal.toFixed(2);
        calculateGrandTotal();
    }

    function calculateGrandTotal() {
        let grandTotal = 0;
        let subtotalBase = 0;
        const taxTotals = {};

        document.querySelectorAll('.item-row:not(.template-row)').forEach(row => {
            try {
                const qtyInput = row.querySelector('.qty-input');
                const rateInput = row.querySelector('.rate-input');
                const enabledCheck = row.querySelector('.tax-enabled-check');
                const inclusiveInput = row.querySelector('.row-is-inclusive');
                
                if (!qtyInput || !rateInput || !enabledCheck) return;

                const qty = parseFloat(qtyInput.value) || 0;
                const rate = parseFloat(rateInput.value) || 0;
                const isTaxEnabled = enabledCheck.checked;
                const isTaxInclusive = inclusiveInput.value === 'true';
                const taxes = getRowTaxes(row);

                let baseRate = rate;
                let taxesToApply = [];

                if (isTaxEnabled) {
                    taxesToApply = taxes;
                    if (isTaxInclusive) {
                        let totalTaxRate = 0;
                        taxesToApply.forEach(t => {
                            const pct = parseFloat(t.taxPercentage);
                            if(!isNaN(pct)) totalTaxRate += pct;
                        });
                        baseRate = rate / (1 + (totalTaxRate / 100));
                    }
                }

                const lineBaseTotal = qty * baseRate;
                subtotalBase += lineBaseTotal;

                taxesToApply.forEach(t => {
                    const taxAmount = lineBaseTotal * (t.taxPercentage / 100);
                    const key = t.taxName + " (" + t.taxPercentage + "%)";
                    taxTotals[key] = (taxTotals[key] || 0) + taxAmount;
                });

                grandTotal += parseFloat(row.querySelector('.row-total-display').value) || 0;
            } catch (err) {
                console.error("Error calculating row total for grand total:", err);
            }
        });

        const subtotalTextEl = document.getElementById('subtotalBaseText');
        if(subtotalTextEl) subtotalTextEl.textContent = subtotalBase.toFixed(2);
        if(grandTotalSpan) grandTotalSpan.textContent = grandTotal.toFixed(2);

        // Update Tax Breakdown
        const breakdownTbody = document.getElementById('taxBreakdownFooter');
        // Clear existing tax rows in footer
        document.querySelectorAll('.tax-breakdown-row').forEach(el => el.remove());
        
        for (const [name, amount] of Object.entries(taxTotals)) {
            const tr = document.createElement('tr');
            tr.className = 'tax-breakdown-row table-light';
            tr.innerHTML = `<td colspan="5" class="text-end text-muted">${name}</td><td class="text-end text-muted">${amount.toFixed(2)}</td><td></td>`;
            breakdownTbody.before(tr);
        }
    }

    function updateRowIndexes() {
        const rows = document.querySelectorAll('.item-row:not(.template-row)');
        rows.forEach((row, idx) => {
            row.querySelector('.product-select').name = 'items[' + idx + '].productEntity';
            row.querySelector('.qty-input').name = 'items[' + idx + '].quantity';
            row.querySelector('.mrp-input').name = 'items[' + idx + '].mrp';
            row.querySelector('.rate-input').name = 'items[' + idx + '].rate';
            row.querySelector('.tax-enabled-check').name = 'items[' + idx + '].taxEnabled';
            row.querySelector('.tax-enabled-check').value = 'true';
            if (row.querySelector('.tax-enabled-hidden')) {
                row.querySelector('.tax-enabled-hidden').name = '_items[' + idx + '].taxEnabled';
            }
            if (row.querySelector('.row-is-inclusive')) {
                row.querySelector('.row-is-inclusive').name = 'items[' + idx + '].taxInclusive';
            }
            row.querySelector('.row-total-display').name = 'items[' + idx + '].rowTotal';
        });
    }

    tbody.addEventListener('input', function(e) {
        if(e.target.classList.contains('qty-input') || e.target.classList.contains('rate-input') || e.target.classList.contains('tax-inclusive-check')) {
            calculateRow(e.target.closest('tr'));
        }
    });

    tbody.addEventListener('change', function(e) {
        if(e.target.classList.contains('product-select')) {
            const row = e.target.closest('tr');
            const productId = e.target.value;
            if (productId) {
                fetch('/api/products/' + productId)
                    .then(r => r.json())
                    .then(data => {
                        row.querySelector('.mrp-input').value = data.mrp;
                        row.querySelector('.rate-input').value = data.supplyRate;
                        row.querySelector('.tax-enabled-check').checked = true;
                        row.querySelector('.row-is-inclusive').value = data.taxInclusive;
                        
                        // Store tax config in row
                        const store = row.querySelector('.row-tax-data-store');
                        store.innerHTML = '';
                        data.taxes.forEach(t => {
                            const span = document.createElement('span');
                            span.className = 'tax-item-config';
                            span.setAttribute('data-name', t.taxName);
                            span.setAttribute('data-percentage', t.taxPercentage);
                            store.appendChild(span);
                        });
                        
                        // Display small label
                        let taxLabel = "";
                        data.taxes.forEach(t => taxLabel += t.taxName + "(" + t.taxPercentage + "%) ");
                        row.querySelector('.row-tax-container').textContent = taxLabel;

                        calculateRow(row);
                    });
            } else {
                row.querySelector('.mrp-input').value = '0.00';
                row.querySelector('.rate-input').value = '0.00';
                row.querySelector('.row-tax-data-store').innerHTML = '';
                row.querySelector('.row-tax-container').textContent = '';
                calculateRow(row);
            }
        }
        if(e.target.classList.contains('tax-enabled-check')) {
            calculateRow(e.target.closest('tr'));
        }
    });

    tbody.addEventListener('click', function(e) {
        if(e.target.classList.contains('remove-row-btn')) {
            e.target.closest('tr').remove();
            updateRowIndexes();
            calculateGrandTotal();
        }
    });

    document.getElementById('addRowBtn').addEventListener('click', function() {
        const template = document.querySelector('.template-row').cloneNode(true);
        template.classList.remove('template-row', 'd-none', 'bg-light');
        
        template.querySelectorAll('input, select').forEach(el => el.disabled = false);
        
        tbody.appendChild(template);
        updateRowIndexes();
    });

    document.querySelectorAll('.item-row:not(.template-row)').forEach(row => calculateRow(row));
});
</script>
</body>
</html>
