<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments :: common_head('Credit Notes')}"></th:block>
    <th:block th:replace="~{fragments :: datatables-css}"></th:block>
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>
<div th:replace="~{fragments :: bottom_nav}"></div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Credit Notes</h2>
        <a href="/credit-notes/new" class="btn btn-warning fw-bold shadow-sm">+ Issue Credit Note</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible bg-success text-white fade show border-0 shadow-sm" role="alert">
        <strong th:text="${successMessage}">Success</strong>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card shadow-sm border-0 p-4">
        <div class="table-responsive">
            <table class="table table-hover align-middle datatable">
                <thead class="table-light">
                    <tr>
                        <th>Doc #</th>
                        <th>Date</th>
                        <th>Buyer</th>
                        <th>Linked Estimate</th>
                        <th>Total Credit</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="crn : ${creditNotes}">
                        <td data-label="Doc #" class="fw-bold text-danger" th:text="${crn.creditNoteNumber}"></td>
                        <td data-label="Date" th:text="${#temporals.format(crn.issueDate, 'dd-MMM-yyyy')}"></td>
                        <td data-label="Buyer" th:text="${crn.buyerEntity != null ? crn.buyerEntity.name : 'Unknown'}"></td>
                        <td data-label="Linked Estimate" th:text="${crn.linkedEstimateEntity != null ? crn.linkedEstimateEntity.estimateNumber : '-'}"></td>
                        <td data-label="Total Credit" class="text-danger fw-bold" th:text="${'-₹ ' + #numbers.formatDecimal(crn.totalCredit, 1, 2)}"></td>
                        <td data-label="Status">
                            <span class="badge" th:classappend="${crn.status.name() == 'VOID' ? 'bg-danger text-white' : (crn.status.name() == 'ISSUED' ? 'bg-success' : 'bg-secondary')}" th:text="${crn.status}"></span>
                        </td>
                        <td data-label="Actions">
                            <a th:href="@{/credit-notes/{id}/edit(id=${crn.id})}" class="btn btn-sm btn-primary shadow-sm" th:if="${crn.status != null and crn.status.name() != 'VOID'}"><i class="bi bi-pencil"></i><span class="d-none d-md-inline"> Edit</span></a>
                            <a th:href="@{/credit-notes/{id}/pdf(id=${crn.id})}" class="btn btn-sm btn-outline-secondary shadow-sm"><i class="bi bi-file-pdf"></i> PDF</a>
                            <form th:action="@{/credit-notes/{id}/void(id=${crn.id})}" method="post" class="d-inline" th:if="${crn.status != null and crn.status.name() != 'VOID'}">
                                <button type="submit" class="btn btn-sm btn-outline-danger shadow-sm" onclick="return confirm('Are you sure you want to void this credit note?');"><i class="bi bi-x-octagon"></i><span class="d-none d-md-inline"> Void</span></button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<th:block th:replace="~{fragments :: datatables-js}"></th:block>
<script>
    $(document).ready(function() {
        $('.datatable').DataTable({
            "order": [ [0, "desc"] ],
            "language": {
                "search": "_INPUT_",
                "searchPlaceholder": "Search Credit Notes..."
            }
        });
    });
</script>
</body>
</html>
