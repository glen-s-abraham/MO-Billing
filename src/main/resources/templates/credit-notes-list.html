<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Notes - MO-Billing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <th:block th:replace="~{fragments :: datatables-css}"></th:block>
    <style>
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Credit Notes</h2>
        <a href="/credit-notes/new" class="btn btn-warning fw-bold shadow-sm">+ Issue Credit Note</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible bg-success text-white fade show border-0 shadow-sm" role="alert">
        <strong th:text="${successMessage}">Success</strong>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card shadow-sm border-0 p-4">
        <div class="table-responsive">
            <table class="table table-hover align-middle datatable">
                <thead class="table-light">
                    <tr>
                        <th>Doc #</th>
                        <th>Date</th>
                        <th>Buyer</th>
                        <th>Linked Estimate</th>
                        <th>Total Credit</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="crn : ${creditNotes}">
                        <td class="fw-bold text-danger" th:text="${crn.creditNoteNumber}"></td>
                        <td th:text="${#temporals.format(crn.issueDate, 'dd-MMM-yyyy')}"></td>
                        <td th:text="${crn.buyerEntity != null ? crn.buyerEntity.name : 'Unknown'}"></td>
                        <td th:text="${crn.linkedEstimateEntity != null ? crn.linkedEstimateEntity.estimateNumber : '-'}"></td>
                        <td class="text-danger fw-bold" th:text="${'-₹ ' + #numbers.formatDecimal(crn.totalCredit, 1, 2)}"></td>
                        <td>
                            <a th:href="@{/credit-notes/{id}/edit(id=${crn.id})}" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></a>
                            <a th:href="@{/credit-notes/{id}/pdf(id=${crn.id})}" class="btn btn-sm btn-danger"><i class="bi bi-file-pdf"></i> PDF</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<th:block th:replace="~{fragments :: datatables-js}"></th:block>
<script>
    $(document).ready(function() {
        $('.datatable').DataTable({
            "order": [ [0, "desc"] ],
            "language": {
                "search": "_INPUT_",
                "searchPlaceholder": "Search Credit Notes..."
            }
        });
    });
</script>
</body>
</html>
