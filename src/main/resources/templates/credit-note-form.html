<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments :: common_head('Credit Note Form')}"></th:block>
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
    <style>
        .row-total-display { font-weight: bold; background-color: #e9ecef; }
        .grand-total-display { font-size: 1.5rem; font-weight: 800; color: #dc3545; }
    </style>
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>
<div th:replace="~{fragments :: bottom_nav}"></div>

<div class="container">
    <div class="mb-4">
        <h2 class="text-danger" th:text="${creditNote.id != null ? 'Edit Credit Note ' + creditNote.creditNoteNumber : 'Issue Credit Note'}">Credit Note</h2>
        <a href="/credit-notes" class="text-decoration-none">&larr; Back to Credit Notes</a>
    </div>

    <form th:action="@{/credit-notes/save}" th:object="${creditNote}" method="post" id="crnForm">
        <input type="hidden" th:field="*{id}">
        <input type="hidden" th:field="*{creditNoteNumber}">

        <div class="card shadow-sm border-0 mb-4 border-top border-danger border-3">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0 text-danger">Mapping & Linkage</h5>
            </div>
            <div class="card-body bg-light">
                <div class="row align-items-end">
                    <div class="col-md-5 mb-3">
                        <label class="form-label fw-bold">Link to Estimate (Optional)</label>
                        <select class="form-select" th:field="*{linkedEstimateEntity}" id="linkEstimateSelect">
                            <option value="">-- No linked Estimate --</option>
                            <option th:each="estimate : ${estimates}" th:value="${estimate.id}" th:text="${estimate.estimateNumber + ' (' + estimate.buyerEntity.name + ')'}"></option>
                        </select>
                        <div class="form-text">Selecting an estimate will automatically populate the buyer and purchased items.</div>
                    </div>
                </div>
            </div>
            <div class="card-body border-top">
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">Select Buyer</label>
                        <select class="form-select" th:field="*{buyerEntity}" id="buyerSelect" required>
                            <option value="">-- Select Buyer --</option>
                            <option th:each="buyer : ${buyers}" th:value="${buyer.id}" th:text="${buyer.name}"></option>
                        </select>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">Issue Date</label>
                        <input type="date" class="form-control" th:field="*{issueDate}" required>
                    </div>
                    <div class="col-md-12 mb-3">
                        <label class="form-label fw-bold">Reason for Credit</label>
                        <input type="text" class="form-control" th:field="*{reasonText}" placeholder="e.g. Items spoiled in transit on delivery date..." required>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm border-0 mb-4">
            <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                <h5 class="mb-0 text-danger">Return Items</h5>
                <button type="button" class="btn btn-sm btn-outline-danger fw-bold" id="addRowBtn">+ Add Return Row</button>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-bordered mb-0" id="itemsTable">
                        <thead class="table-light">
                            <tr>
                                <th width="35%">Product</th>
                                <th width="15%">Return Qty</th>
                                <th width="20%">Rate (₹)</th>
                                <th width="20%">Return Total (₹)</th>
                                <th width="10%" class="text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="itemsTbody">
                            <!-- Template row for JS cloning -->
                            <tr class="item-row template-row d-none bg-light">
                                <td>
                                    <select class="form-select product-select" disabled>
                                        <option value="">-- Select --</option>
                                        <option th:each="product : ${products}" th:value="${product.id}" th:text="${product.title}"></option>
                                    </select>
                                </td>
                                <td><input type="number" step="0.01" class="form-control qty-input" value="1" disabled></td>
                                <td><input type="number" step="0.01" class="form-control rate-input" value="0.00" disabled></td>
                                <td><input type="text" class="form-control row-total-display text-end" value="0.00" readonly disabled></td>
                                <td class="text-center"><button type="button" class="btn btn-sm btn-danger remove-row-btn fw-bold">X</button></td>
                            </tr>
                            
                            <!-- Existing rows -->
                            <tr class="item-row" th:each="item, stat : *{items}">
                                <td>
                                    <select class="form-select product-select" th:name="'items[' + ${stat.index} + '].productEntity'">
                                        <option value="">-- Select --</option>
                                        <option th:each="product : ${products}" 
                                                th:value="${product.id}" 
                                                th:text="${product.title}"
                                                th:selected="${item.productEntity != null and item.productEntity.id == product.id}">
                                        </option>
                                    </select>
                                </td>
                                <td>
                                    <input type="number" step="0.01" class="form-control qty-input" th:name="'items[' + ${stat.index} + '].returnQuantity'" th:value="${item.returnQuantity}">
                                </td>
                                <td>
                                    <input type="number" step="0.01" class="form-control rate-input" th:name="'items[' + ${stat.index} + '].rate'" th:value="${item.rate}">
                                </td>
                                <td>
                                    <input type="text" class="form-control row-total-display text-end" th:name="'items[' + ${stat.index} + '].rowTotal'" th:value="${item.rowTotal}" readonly>
                                </td>
                                <td class="text-center"><button type="button" class="btn btn-sm btn-danger remove-row-btn fw-bold">X</button></td>
                            </tr>
                        </tbody>
                        <tfoot>
                            <tr>
                                <td colspan="3" class="text-end fw-bold align-middle">Total Credit Amount</td>
                                <td class="text-end grand-total-display">-₹ <span id="grandTotalText">0.00</span></td>
                                <td></td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>

        <div class="text-end">
            <button type="submit" class="btn btn-danger btn-lg px-5 fw-bold shadow-sm rounded-pill">Save Credit Note</button>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
<script th:inline="javascript">
document.addEventListener('DOMContentLoaded', function() {
    const tbody = document.getElementById('itemsTbody');
    const grandTotalSpan = document.getElementById('grandTotalText');
    const linkSelect = document.getElementById('linkEstimateSelect');
    const buyerSelect = document.getElementById('buyerSelect');

    new TomSelect("#linkEstimateSelect", {
        create: false,
        placeholder: "-- No linked Estimate --"
    });

    function calculateRow(row) {
        const qty = parseFloat(row.querySelector('.qty-input').value) || 0;
        const rate = parseFloat(row.querySelector('.rate-input').value) || 0;
        const total = qty * rate;
        row.querySelector('.row-total-display').value = total.toFixed(2);
        calculateGrandTotal();
    }

    function calculateGrandTotal() {
        let gt = 0;
        document.querySelectorAll('.item-row:not(.template-row) .row-total-display').forEach(input => {
            gt += parseFloat(input.value) || 0;
        });
        grandTotalSpan.textContent = gt.toFixed(2);
    }

    function updateRowIndexes() {
        const rows = document.querySelectorAll('.item-row:not(.template-row)');
        rows.forEach((row, idx) => {
            row.querySelector('.product-select').name = 'items[' + idx + '].productEntity';
            row.querySelector('.qty-input').name = 'items[' + idx + '].returnQuantity';
            row.querySelector('.rate-input').name = 'items[' + idx + '].rate';
            row.querySelector('.row-total-display').name = 'items[' + idx + '].rowTotal';
        });
    }

    function createRowFromData(productId, qty, rate) {
        const template = document.querySelector('.template-row').cloneNode(true);
        template.classList.remove('template-row', 'd-none', 'bg-light');
        
        template.querySelectorAll('input, select').forEach(el => el.disabled = false);
        
        template.querySelector('.product-select').value = productId;
        template.querySelector('.qty-input').value = qty;
        template.querySelector('.rate-input').value = rate;
        
        tbody.appendChild(template);
        calculateRow(template);
    }

    linkSelect.addEventListener('change', function(e) {
        const estimateId = e.target.value;
        if(estimateId) {
            if(document.querySelectorAll('.item-row:not(.template-row)').length > 0) {
                if(!confirm("Linking an estimate will clear your existing credit note rows. Continue?")) {
                    e.target.value = '';
                    return;
                }
            }
            
            fetch('/api/estimates/' + estimateId)
                .then(r => r.json())
                .then(data => {
                    if(data.buyerId) {
                        buyerSelect.value = data.buyerId;
                    }
                    
                    document.querySelectorAll('.item-row:not(.template-row)').forEach(r => r.remove());
                    
                    if(data.items && data.items.length > 0) {
                        data.items.forEach(item => {
                            createRowFromData(item.productId, item.quantity, item.rate);
                        });
                        updateRowIndexes();
                    }
                })
                .catch(err => {
                    console.error("Error fetching estimate data", err);
                    alert("Could not load estimate data.");
                });
        }
    });

    tbody.addEventListener('input', function(e) {
        if(e.target.classList.contains('qty-input') || e.target.classList.contains('rate-input')) {
            calculateRow(e.target.closest('tr'));
        }
    });

    tbody.addEventListener('change', function(e) {
        if(e.target.classList.contains('product-select')) {
            const row = e.target.closest('tr');
            const productId = e.target.value;
            if (productId && !linkSelect.value) {
                fetch('/api/products/' + productId)
                    .then(r => r.json())
                    .then(data => {
                        row.querySelector('.rate-input').value = data.supplyRate;
                        calculateRow(row);
                    });
            }
        }
    });

    tbody.addEventListener('click', function(e) {
        if(e.target.classList.contains('remove-row-btn')) {
            e.target.closest('tr').remove();
            updateRowIndexes();
            calculateGrandTotal();
        }
    });

    document.getElementById('addRowBtn').addEventListener('click', function() {
        const template = document.querySelector('.template-row').cloneNode(true);
        template.classList.remove('template-row', 'd-none', 'bg-light');
        template.querySelectorAll('input, select').forEach(el => el.disabled = false);
        tbody.appendChild(template);
        updateRowIndexes();
    });

    document.querySelectorAll('.item-row:not(.template-row)').forEach(row => calculateRow(row));
});
</script>
</body>
</html>
