<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Buyer - MO-Billing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>

<div class="container">
    <div class="mb-4">
        <h2 th:text="${buyer.id != null ? 'Edit Buyer' : 'Add New Buyer'}">Add Buyer</h2>
        <a href="/buyers" class="text-decoration-none">&larr; Back to Directory</a>
    </div>

    <div class="card shadow-sm border-0 p-4 mx-auto" style="max-width: 800px;">
        <form th:action="@{/buyers/save}" th:object="${buyer}" method="post">
            <input type="hidden" th:field="*{id}">
            
            <div class="row">
                <div class="col-md-8 mb-3">
                    <label class="form-label fw-bold">Company / Buyer Name</label>
                    <input type="text" class="form-control" th:field="*{name}" th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'" required>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label fw-bold">Tax ID (GSTIN/VAT)</label>
                    <input type="text" class="form-control" th:field="*{taxId}">
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Billing Address</label>
                    <textarea class="form-control" th:field="*{billingAddress}" rows="3"></textarea>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Shipping Address</label>
                    <textarea class="form-control" th:field="*{shippingAddress}" rows="3"></textarea>
                </div>
            </div>

            <h5 class="mt-3 mb-3 border-bottom pb-2">Contact Information</h5>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label fw-bold">Contact Person</label>
                    <input type="text" class="form-control" th:field="*{contactPerson}">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label fw-bold">Email Address</label>
                    <input type="email" class="form-control" th:field="*{email}" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label fw-bold">Phone Number</label>
                    <input type="text" class="form-control" th:field="*{phone}">
                </div>
            </div>

            <div class="form-check form-switch mt-3 mb-4">
                <input class="form-check-input" type="checkbox" role="switch" th:field="*{isActive}" id="activeSwitch">
                <label class="form-check-label fw-bold" for="activeSwitch">Is Active Account?</label>
                <div class="form-text">Inactive buyers will not appear in dropdown menus for new invoices.</div>
            </div>

            <div class="text-end border-top pt-3">
                <button type="submit" class="btn btn-primary fw-bold px-4">Save Buyer</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
