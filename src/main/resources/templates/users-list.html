<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments :: common_head('User Management')}"></th:block>
    <th:block th:replace="~{fragments :: datatables-css}"></th:block>
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>
<div th:replace="~{fragments :: bottom_nav}"></div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>User Module</h2>
        <a href="/users/new" class="btn btn-primary fw-bold shadow-sm">+ Add User</a>
    </div>

    <div class="card shadow-sm border-0 p-4">
        <div class="table-responsive">
            <table class="table table-hover align-middle datatable">
                <thead class="table-light">
                    <tr>
                        <th>Username</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${users}">
                        <td data-label="Username" class="fw-bold" th:text="${u.username}"></td>
                        <td data-label="Role">
                            <span class="badge bg-info-subtle text-info rounded-pill px-3" th:text="${u.role}"></span>
                        </td>
                        <td data-label="Status">
                            <span th:if="${u.isActive}" class="badge bg-success">Active</span>
                            <span th:unless="${u.isActive}" class="badge bg-danger">Inactive</span>
                        </td>
                        <td data-label="Actions">
                            <a th:href="@{/users/{id}/edit(id=${u.id})}" class="btn btn-sm btn-primary shadow-sm"><i class="bi bi-pencil"></i><span class="d-none d-md-inline"> Edit</span></a>
                            
                            <form th:action="@{/users/{id}/toggle(id=${u.id})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-sm shadow-sm" th:classappend="${u.isActive ? 'btn-outline-danger' : 'btn-outline-success'}">
                                    <i class="bi" th:classappend="${u.isActive ? 'bi-person-x' : 'bi-person-check'}"></i>
                                    <span class="d-none d-md-inline" th:text="${u.isActive ? ' Deactivate' : ' Activate'}"></span>
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<th:block th:replace="~{fragments :: datatables-js}"></th:block>
<script>
    $(document).ready(function() {
        $('.datatable').DataTable({
            "order": [],
            "language": {
                "search": "_INPUT_",
                "searchPlaceholder": "Filter Users..."
            }
        });
    });
</script>
</body>
</html>
